server:
  port: 1234
spring:
  flyway:
    enabled: false
    locations: classpath:db.migration
    baseline-on-migrate: true
    validate-on-migrate: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /
    enabled: true

carimbai:
  hmac-secret: ${CARIMBAI_HMAC_SECRET:dev-secret-change-me}
  stamps-needed: 10
  stamps-default-needed: 10
  rate-limit:
    seconds: 120
  jwt:
    secret: ${CARIMBAI_JWT_SECRET:dev-only-insecure-do-not-use-in-prod-change-me}
    expiration-seconds: 28800