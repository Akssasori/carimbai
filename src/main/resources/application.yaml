spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  output:
      ansi:
          enabled: ALWAYS
  application:
      name: carimbai
carimbai:
  hmac-secret: ${CARIMBAI_HMAC_SECRET}
  stamps-needed: 10
  stamps-default-needed: 10
  rate-limit:
    seconds: 120
  qr-ttl:
    seconds: 90
  jwt:
    secret: ${CARIMBAI_JWT_SECRET}
    expiration-seconds: 28800
  oauth:
    google:
      client-id: ${CARIMBAI_GOOGLE_CLIENT_ID:}
    apple:
      client-id: ${CARIMBAI_APPLE_CLIENT_ID:}
      team-id: ${CARIMBAI_APPLE_TEAM_ID:}
    facebook:
      app-id: ${CARIMBAI_FACEBOOK_APP_ID:}
      app-secret: ${CARIMBAI_FACEBOOK_APP_SECRET:}