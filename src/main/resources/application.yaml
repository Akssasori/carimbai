spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  output:
      ansi:
          enabled: ALWAYS
  application:
      name: carimbai
  mail:
    host: ${CARIMBAI_MAIL_HOST:smtp.resend.com}
    port: ${CARIMBAI_MAIL_PORT:465}
    username: ${CARIMBAI_MAIL_USERNAME:resend}
    password: ${CARIMBAI_RESEND_API_KEY:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
carimbai:
  hmac-secret: ${CARIMBAI_HMAC_SECRET}
  stamps-needed: 10
  stamps-default-needed: 10
  timezone: ${CARIMBAI_TIMEZONE:America/Sao_Paulo}
  rate-limit:
    seconds: 120
  qr-ttl:
    seconds: 90
  jwt:
    secret: ${CARIMBAI_JWT_SECRET}
    expiration-seconds: 3600          # access token staff: 1h (com refresh)
    customer-expiration-seconds: 2592000
    refresh-token-days: 30            # refresh token staff: 30d
  login-rate-limit:
    max-attempts: 5
    window-minutes: 15
  mail:
    from: ${CARIMBAI_MAIL_FROM:}
    from-name: ${CARIMBAI_MAIL_FROM_NAME:Carimbai}
  app-base-url: ${CARIMBAI_APP_BASE_URL:http://localhost:5173}
  password-reset:
    token-ttl-hours: 1
  vapid:
    public-key: ${CARIMBAI_VAPID_PUBLIC_KEY:}
    private-key: ${CARIMBAI_VAPID_PRIVATE_KEY:}
    subject: ${CARIMBAI_VAPID_SUBJECT:mailto:contato@example.com}
  notification:
    remind-at-remaining: 1
  oauth:
    google:
      client-id: ${CARIMBAI_GOOGLE_CLIENT_ID}
    apple:
      client-id: ${CARIMBAI_APPLE_CLIENT_ID:}
      team-id: ${CARIMBAI_APPLE_TEAM_ID:}
    facebook:
      app-id: ${CARIMBAI_FACEBOOK_APP_ID:}
      app-secret: ${CARIMBAI_FACEBOOK_APP_SECRET:}